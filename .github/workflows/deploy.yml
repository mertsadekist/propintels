name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint & Type Check
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run type-check

  # ─────────────────────────────────────────────
  # Job 2: Unit Tests
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: ist_test
          MYSQL_USER: test_user
          MYSQL_PASSWORD: test_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -ptestpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: "mysql://test_user:test_password@localhost:3306/ist_test"
      REDIS_URL: "redis://localhost:6379"
      NEXTAUTH_SECRET: "test-secret-for-ci-only-minimum-32-chars"
      NEXTAUTH_URL: "http://localhost:3000"
      S3_BUCKET: "test-bucket"
      S3_REGION: "auto"
      S3_ENDPOINT: "http://localhost:9000"
      S3_ACCESS_KEY_ID: "test-key"
      S3_SECRET_ACCESS_KEY: "test-secret"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run test

  # ─────────────────────────────────────────────
  # Job 3: Build Docker Images
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      app-digest: ${{ steps.build-app.outputs.digest }}
      worker-digest: ${{ steps.build-worker.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (app)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/app
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata (worker)
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push App image
        id: build-app
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        id: build-worker
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile.worker
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 4: Deploy to Staging
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: https://staging.ist-platform.com
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/ist-platform
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}/app:sha-${{ github.sha }}
            docker pull ghcr.io/${{ github.repository }}/worker:sha-${{ github.sha }}
            sed -i "s|APP_IMAGE=.*|APP_IMAGE=ghcr.io/${{ github.repository }}/app:sha-${{ github.sha }}|" .env
            sed -i "s|WORKER_IMAGE=.*|WORKER_IMAGE=ghcr.io/${{ github.repository }}/worker:sha-${{ github.sha }}|" .env
            docker-compose run --rm migrator
            docker-compose up -d --no-deps app worker
            sleep 15
            curl -f http://localhost:3000/api/health || exit 1
            echo "Staging deploy successful: sha-${{ github.sha }}"

  # ─────────────────────────────────────────────
  # Job 5: Deploy to Production
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://ist-platform.com
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/ist-platform
            PREV_APP=$(grep APP_IMAGE .env | cut -d'=' -f2)
            PREV_WORKER=$(grep WORKER_IMAGE .env | cut -d'=' -f2)
            echo "PREV_APP=$PREV_APP" > .rollback
            echo "PREV_WORKER=$PREV_WORKER" >> .rollback
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}/app:sha-${{ github.sha }}
            docker pull ghcr.io/${{ github.repository }}/worker:sha-${{ github.sha }}
            docker-compose run --rm migrator
            if [ $? -ne 0 ]; then echo "Migration failed! Aborting."; exit 1; fi
            sed -i "s|APP_IMAGE=.*|APP_IMAGE=ghcr.io/${{ github.repository }}/app:sha-${{ github.sha }}|" .env
            sed -i "s|WORKER_IMAGE=.*|WORKER_IMAGE=ghcr.io/${{ github.repository }}/worker:sha-${{ github.sha }}|" .env
            docker-compose up -d --no-deps app worker
            MAX_RETRIES=5
            RETRY_COUNT=0
            until curl -f http://localhost:3000/api/health || [ $RETRY_COUNT -eq $MAX_RETRIES ]; do
              RETRY_COUNT=$((RETRY_COUNT+1))
              sleep 10
            done
            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              source .rollback
              sed -i "s|APP_IMAGE=.*|APP_IMAGE=$PREV_APP|" .env
              sed -i "s|WORKER_IMAGE=.*|WORKER_IMAGE=$PREV_WORKER|" .env
              docker-compose up -d --no-deps app worker
              exit 1
            fi
            echo "Production deploy successful: sha-${{ github.sha }}"

      - name: Notify Slack (success)
        if: success()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: '{"text": "✅ Production deploy successful: `sha-${{ github.sha }}` by @${{ github.actor }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack (failure)
        if: failure()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: '{"text": "🚨 Production deploy FAILED: `sha-${{ github.sha }}` by @${{ github.actor }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
